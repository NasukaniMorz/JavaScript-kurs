<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heads | Tails</title>
</head>
<body>
    

    <button onclick="playGame('heads');">Heads</button>
    <button onclick="playGame('tails');">Tails</button>
    <button onclick="resetScore()">Reset score</button>

    <script>

        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0, 
            ties: 0 
        };


        function playGame(playerMove){
            const computerMove = pickComputerMove();
            let result = '';
        if(playerMove === 'heads'){
            if (computerMove === 'tails'){
                result = 'You win.'
            }else if (computerMove === 'heads'){
                result = 'Tie.'
            }
        }else if( playerMove === 'tails'){
            if (computerMove === 'heads'){
                result = 'You lose.'
            }else if (computerMove === 'tails'){
                result = 'Tie.'
            }
        }
        

        if(result === "You win.") {
            score.wins += 1;
        }else if(result === "You lose."){
            score.losses += 1;
        }else if(result === "Tie."){
            score.ties += 1;
        }


        localStorage.setItem('score', JSON.stringify(score));

        alert(`You picked ${playerMove}, computer picked ${computerMove}. ${result} \n
        Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`)
        }

        


        function pickComputerMove(){

            let randomNumber = Math.random();
            let computerMove = '';

            if(randomNumber >= 0 && randomNumber < 1 / 2){
                computerMove = "heads";
            }else if(randomNumber >= 1 / 2 && randomNumber < 1){
                computerMove = 'tails';
            }
            return computerMove;
        };

        function resetScore(){
            score.wins = 0,
            score.losses = 0,
            score.ties = 0
            localStorage.removeItem('score');
            return score;
        };

    </script>
</body>
</html>
